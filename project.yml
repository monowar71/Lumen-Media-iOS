name: LumenMedia
options:
  bundleIdPrefix: com.lumenmedia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1,2"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  LumenMediaCore:
    path: .
targets:
  LumenMedia:
    type: application
    platform: iOS
    sources:
      - path: App-iOS
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumenmedia.ios
        INFOPLIST_FILE: App-iOS/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: ""
        SWIFT_STRICT_CONCURRENCY: targeted
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    dependencies:
      - package: LumenMediaCore
        product: LumenMediaCore
  LumenMediaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumenmedia.ios.uitests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: ""
        TEST_TARGET_NAME: LumenMedia
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: LumenMedia
schemes:
  LumenMedia:
    build:
      targets:
        LumenMedia: all
        LumenMediaUITests: [test]
    test:
      targets:
        - LumenMediaUITests
      environmentVariables:
        LUMEN_BASE_URL: http://192.168.0.2:8096
        LUMEN_USER: admin
        LUMEN_PASS: admin123
